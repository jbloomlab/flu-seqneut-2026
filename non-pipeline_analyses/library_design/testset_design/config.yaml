# Configuration file for analysis

# subtypes to analyze
subtypes: [H3N2, H1N1]

# GenBank match freezing.
# The match_genbank rule queries NCBI for the closest GenBank nucleotide match to
# each library protein; that result can drift between runs as GenBank is updated.
# When `freeze_genbank_match` is true, the pipeline instead reads committed frozen
# copies from `frozen_genbank_match_dir` (one CSV per subtype, named `{subtype}.csv`)
# and does NOT run match_genbank, so accessions cannot change on a rerun.
# To refresh: set this false, run the pipeline, copy the regenerated
# results/genbank_match/{subtype}/match_prot_to_genbank_nt.csv files into
# `frozen_genbank_match_dir` as `{subtype}.csv`, commit them, then set this true again.
freeze_genbank_match: true
frozen_genbank_match_dir: data/frozen_genbank_match

# TSVs giving selected haplotypes of HA proteins. Must have following columns:
#  - representative_strain: name of strain representative of haplotype
#  - representative_strain_ha_sequence: HA protein sequence of haplotype (must be full-length)
selected_haplotypes:
  H3N2: data/2026-testset-strain-selection-H3N2.tsv
  H1N1: data/2026-testset-strain-selection-H1N1.tsv