
############################### Configure insert design ############################################
start_codon: "ATGAAG"
special_start_codons: null
n_barcodes: 2 # number of barcodes to generate per strain
random_seed: 202604131030
contributor: Andrew Butler
vector: pHW2000
past_barcodes_to_avoid: 
  - "data/2026-05-07_seqneut_construct_log.csv"
past_protein_sequences_to_avoid:
  - "data/2026-05-07_seqneut_construct_log.csv"
annotation_file: "data/vaccine_annotations.csv"

# Reference CSVs used to back-fill a missing `collection_date` in the final
# library. Each file must have `protein_sequence_HA_ectodomain` and
# `collection_date` columns; the date is matched by HA ectodomain sequence and
# only fills rows whose collection_date is empty (never overwrites). Dates may be
# in decimal-year form (e.g. 2025.76) and are converted to YYYY-MM-DD. Files are
# consulted in order; the first one with a matching sequence wins, so the
# manually curated dates (authoritative) are listed first.
collection_date_reference_files:
  # Manually curated dates (authoritative, and for strains with no prior-round
  # designed CSV). See the source_note column in the file for provenance.
  - "data/manual_collection_dates.csv"
  - "data/flu-seqneut-2025to2026-barcode-to-strain-designed.csv"
  - "data/flu-seqneut-2025-barcode-to-strain_designed.csv"

# Reference CSV(s) of existing vaccine-reference constructs to explicitly include
# in the final library. Each file must have a `protein_sequence_HA_ectodomain`
# column; the matching construct (made in a prior round, present in the
# past_protein_sequences_to_avoid construct log) is pulled in by HA ectodomain
# sequence with its existing shortname / barcode / plasmid id. Fails fast if a
# listed sequence is not found in the construct log.
additional_vaccine_constructs:
  - "data/additional_vaccine_constructs.csv"

subtype_params:
  H3N2:
    append_additional_upstream_sequence: ''
    ectodomain_start: 48 # 16x3, start after first 16 amino acids
    ectodomain_length: 1551 # 517x3, continue for 517 amino acids
    endodomain_sequence: 'atcaagggagttgagctgaagtcaggatacaaagattggatcctatggatttcctttgccATGtcTtgCttCCtActGtgCgtAgcACtACtAggCttTatTatgtgggcGtgTcaGaaAggCtcCCtAcaAtgTCgGatTtgTatTTAATAG' # H3 endodomain and WSN CT
  H1N1:
    append_additional_upstream_sequence: 'ata' # 20th amino acid of upstream WSN signal peptide
    ectodomain_start: 60 # 20x3, start after first 20 amino acids
    ectodomain_length: 1560 # 520x3, continue for 520 amino acids
    endodomain_sequence: 'aaattggaatcaatgggagtgtatcagattctggcgatatattctacagtggcaagctccttagtactgctagtttctttaggagcgattagcttttggatgtgctccaacggCtcCCtAcaAtgTCgGatTtgTatTTAATAG' # WSN endodomain and CT

